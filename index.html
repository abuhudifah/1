<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="آلة حاسبة بسيطة للعمليات الحسابية اليومية" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="حاسبة" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json" />

  <!-- أيقونات -->
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192.png" />

  <!-- Content Security Policy — TASK-5.2 -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src  'self' https://cdn.tailwindcss.com https://unpkg.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com;
    style-src   'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src    'self' https://fonts.gstatic.com;
    connect-src 'self' https://*.supabase.co wss://*.supabase.co;
    img-src     'self' data: blob: https:;
    worker-src  'self' blob:;
  ">

  <title>حاسبة</title>

  <!-- ============================================================
       الخطوط — IBM Plex Sans Arabic (Google Fonts)
       ============================================================ -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />

  <!-- ============================================================
       Tailwind CSS (CDN)
       ============================================================ -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // إعداد Tailwind لدعم الوضع المظلم واللغة العربية
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            arabic: ['"IBM Plex Sans Arabic"', 'system-ui', 'sans-serif'],
            mono  : ['"IBM Plex Mono"', 'monospace'],
          },
          colors: {
            primary : '#0f172a',
            accent  : '#2563eb',
            success : '#059669',
            danger  : '#dc2626',
            warning : '#d97706',
            info    : '#0284c7',
          },
        },
      },
    };
  </script>

  <!-- ============================================================
       التنسيقات المخصصة
       ============================================================ -->
  <link rel="stylesheet" href="assets/css/styles.css" />

  <!-- ============================================================
       المكتبات الخارجية
       ترتيب التحميل مهم: Dexie → Chart.js → Lucide → Supabase
       ============================================================ -->

  <!-- Dexie.js — التخزين المحلي (IndexedDB) -->
  <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.js"></script>

  <!-- Chart.js — الرسوم البيانية -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <!-- Lucide Icons — الأيقونات -->
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

  <!-- Supabase JS Client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- expr-eval — تقييم آمن للمعادلات الرياضية (الآلة الحاسبة) -->
  <script src="https://cdn.jsdelivr.net/npm/expr-eval@2.0.2/dist/bundle.min.js"></script>

  <!-- SheetJS (xlsx) — تصدير التقارير إلى Excel (.xlsx) -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <!-- html2pdf.js — توليد PDF حقيقي من عناصر HTML داخل الصفحة -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

</head>

<body class="font-arabic" id="app-body">

  <!-- skip-to-content — يظهر فقط عند التنقل بـ Tab (إمكانية الوصول) -->
  <a href="#app-root" class="skip-link">تخطي إلى المحتوى الرئيسي</a>

  <!-- ============================================================
       شاشة التحميل الأولية
       تُخفى بعد اكتمال تهيئة التطبيق من App.js
       ============================================================ -->
  <div id="app-loading" aria-label="جاري التحميل" role="status">
    <div class="loading-logo">حاسبة</div>
    <div class="spinner" aria-hidden="true"></div>
    <div class="loading-text">جاري التحميل...</div>
  </div>

  <!-- ============================================================
       جذر التطبيق الرئيسي
       يُبنى محتواه ديناميكياً من App.js
       ============================================================ -->
  <div id="app-root" aria-live="polite"></div>

  <!-- ============================================================
       ملفات المشروع — يُحمَّل بعد اكتمال DOM
       الترتيب الصارم:
       1. config.js        ← الثوابت (يجب أن يكون أولاً)
       2. helpers.js       ← الدوال المساعدة
       3. Dexie.js         ← طبقة قاعدة البيانات المحلية
       4. SupabaseClient.js← تهيئة عميل Supabase
       5. Repository.js    ← CRUD موحد (Dexie + Supabase)
       6. SyncQueue.js     ← طابور المزامنة
       7. AuthService.js   ← المصادقة والجلسات
       8. AccountingService.js ← نظام القيد المزدوج
       9. SyncService.js   ← إدارة المزامنة عبر الشبكة
       10. ThemeManager.js ← مدير الوضع المظلم/الفاتح (موحد)
       11. IdleTimer.js    ← الخروج التلقائي للمندوبين [المرحلة 3]
       12. AppStore.js     ← الحالة المركزية (EventTarget)
       13. App.js          ← التطبيق الرئيسي والتوجيه
       14. المكونات (Components) — بعد App.js
       ============================================================ -->

  <!-- الطبقة الأولى: الإعدادات -->
  <script src="config.js" defer></script>

  <!-- الطبقة الثانية: الأدوات المساعدة -->
  <script src="utils/helpers.js" defer></script>

  <!-- الطبقة الثالثة: طبقة البيانات -->
  <script src="repository/Dexie.js"         defer></script>
  <script src="repository/SupabaseClient.js" defer></script>
  <script src="repository/Repository.js"    defer></script>
  <script src="repository/SyncQueue.js"     defer></script>

  <!-- مودالات مشتركة (قبل الخدمات لأن AuthService يستخدمها) -->
  <script src="components/PasswordDialog.js"  defer></script>
  <script src="components/PinDialog.js"       defer></script>

  <!-- الطبقة الرابعة: الخدمات -->
  <script src="services/OutboxService.js"       defer></script>
  <script src="services/DataSourceConfig.js"   defer></script>
  <script src="services/SessionVault.js"       defer></script>
  <script src="services/OfflineAuthService.js" defer></script>
  <script src="services/AuthService.js"        defer></script>
  <script src="services/AccountingService.js"  defer></script>
  <script src="services/SyncService.js"             defer></script>
  <script src="services/RealtimeChannelManager.js"  defer></script>
  <script src="services/LocalOperationsService.js"  defer></script>
  <script src="services/SyncEngine.js"         defer></script>

  <!-- مدير الوضع المظلم (يجب أن يكون قبل LoginComponent) -->
  <script src="services/ThemeManager.js"      defer></script>

  <!-- خدمة الطباعة والمشاركة المشتركة -->
  <script src="services/PrintService.js"      defer></script>

  <!-- خدمة الخروج التلقائي للمندوبين [المرحلة 3] — بعد AuthService وقبل App.js -->
  <script src="services/IdleTimer.js"         defer></script>

  <!-- الطبقة الخامسة: إدارة الحالة -->
  <script src="store/AppStore.js" defer></script>

  <!-- الطبقة السادسة: التطبيق الرئيسي -->
  <script src="App.js" defer></script>

  <!-- الطبقة السابعة: المكونات (Components) -->
  <script src="components/LoginComponent.js"         defer></script>
  <script src="components/DashboardComponent.js"     defer></script>
  <script src="components/DataEntryComponent.js"     defer></script>
  <script src="components/DailySummaryComponent.js"  defer></script>
  <script src="components/BankAccountsComponent.js"  defer></script>
  <script src="components/DebtorsComponent.js"       defer></script>
  <script src="components/FailedDepositsComponent.js" defer></script>
  <script src="components/NotificationsComponent.js" defer></script>
  <script src="components/AllOperationsComponent.js" defer></script>
  <script src="components/AuditLogComponent.js"      defer></script>
  <script src="components/UsersComponent.js"         defer></script>
  <script src="components/AccountManagementComponent.js" defer></script>
  <script src="components/SettingsComponent.js"      defer></script>
  <!-- إعدادات الملف الشخصي (للجميع) -->
  <script src="components/ProfileSettingsComponent.js" defer></script>

  <!-- إشعار الدخول السريع -->
  <script src="utils/QuickLoginBanner.js" defer></script>

  <!-- صوت الإشعارات + اهتزاز + App Badge -->
  <script src="utils/NotificationSound.js" defer></script>

  <!-- مدير PWA (التثبيت + التحديثات) -->
  <script src="utils/PWAManager.js" defer></script>

</body>
</html>
